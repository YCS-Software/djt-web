version: '3.8'

# NOTE: The backend API is the shared DJT-App server (it lives in the DJT-App
# repo and is deployed separately). This compose file only builds/serves the
# admin frontend and an nginx reverse proxy that forwards /api to that shared
# server. Set API_UPSTREAM (host:port) to point at it.

services:
  # Frontend (admin panel)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: evcharge-frontend
    ports:
      - "3001:80"
    networks:
      - evcharge-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: evcharge-nginx
    environment:
      # host:port of the shared DJT-App API server
      API_UPSTREAM: ${API_UPSTREAM:-3.110.84.196:5000}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    # Render ${API_UPSTREAM} into the config via envsubst, then run nginx.
    command: /bin/sh -c "envsubst '$$API_UPSTREAM' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    depends_on:
      - frontend
    networks:
      - evcharge-network

networks:
  evcharge-network:
    driver: bridge
