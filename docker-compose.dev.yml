version: '3.8'

# Development override - run with: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# The backend API is the shared DJT-App server (run it from the DJT-App repo).
# In dev, the admin frontend is usually run separately with hot reload:
#   cd frontend && npm start
# Point it at your running DJT-App server via frontend/.env (REACT_APP_API_URL).
#
# Override the proxied API host for the nginx service if needed:
services:
  nginx:
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-host.docker.internal:5000}
